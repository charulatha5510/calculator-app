<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Calculator</title>

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.calculator{
    background:#1e1e2f;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

#display{
    width:100%;
    height:60px;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
    font-size:24px;
    text-align:right;
    padding-right:10px;
    box-sizing:border-box;
    background:#f5f5f5;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,70px);
    gap:10px;
}

button{
    height:65px;
    border:none;
    border-radius:12px;
    font-size:20px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

.number{
    background:#2d2d44;
    color:white;
}

.operator{
    background:#ff9500;
    color:white;
}

.special{
    background:#ff3b30;
    color:white;
}

.equal{
    background:#34c759;
    color:white;
}
</style>
</head>

<body>

<div class="calculator">

    <input type="text" id="display" readonly>

    <div class="buttons">

        <button class="special" onclick="clearDisplay()">C</button>
        <button class="special" onclick="backspace()">⌫</button>
        <button class="operator" onclick="append('/')">/</button>
        <button class="operator" onclick="append('*')">*</button>

        <button class="number" onclick="append('7')">7</button>
        <button class="number" onclick="append('8')">8</button>
        <button class="number" onclick="append('9')">9</button>
        <button class="operator" onclick="append('-')">-</button>

        <button class="number" onclick="append('4')">4</button>
        <button class="number" onclick="append('5')">5</button>
        <button class="number" onclick="append('6')">6</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="number" onclick="append('1')">1</button>
        <button class="number" onclick="append('2')">2</button>
        <button class="number" onclick="append('3')">3</button>
        <button class="equal" onclick="calculate()">=</button>

        <button class="number" onclick="append('0')">0</button>
        <button class="number" onclick="append('.')">.</button>
        



    
        

    </div>

</div>

<script>

function append(value){
    document.getElementById("display").value += value;
}

function clearDisplay(){
    document.getElementById("display").value = "";
}

function backspace(){
    let display = document.getElementById("display");
    display.value = display.value.slice(0,-1);
}

function calculate(){
    try{
        document.getElementById("display").value =
        eval(document.getElementById("display").value);
    }
    catch{
        alert("Invalid Expression");
    }
}

</script>

</body>
</html>
